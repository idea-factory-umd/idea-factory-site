<!-- @dsCard group="Type" viewport="700x150" name="Eyebrows, labels & stats" subtitle="Uppercase Interstate for kickers, tags, and big numerals" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface);display:flex;gap:48px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:6px}
  .tag{font-family:var(--font-heading);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-subtle)}
  .stat{font-family:var(--font-heading);font-weight:800;font-size:64px;line-height:.9;letter-spacing:-0.03em;color:var(--md-black)}
</style></head><body>
  <div class="col">
    <span class="if-eyebrow">For Students</span>
    <span class="tag">Eyebrow / kicker · 14px Bold · tracking 0.04em · red</span>
  </div>
  <div class="col">
    <span class="stat">$94.8B</span>
    <span class="tag">Stat numeral · Black 800 · tracking −0.03em</span>
  </div>
</body></html>
