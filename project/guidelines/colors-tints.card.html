<!-- @dsCard group="Colors" viewport="700x150" name="Soft tints" subtitle="Red & gold tints for calm, content-dense areas" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface)}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
  .sw{border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden}
  .chip{height:64px}
  .meta{padding:9px 11px;font-family:var(--font-heading)}
  .name{font-weight:700;font-size:11px;letter-spacing:.02em;text-transform:uppercase;color:var(--text-strong)}
  .hex{font-size:11px;color:var(--text-subtle);font-family:var(--font-body)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--red-tint)"></div><div class="meta"><div class="name">Red tint</div><div class="hex">#fdeaec</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--red-tint-2)"></div><div class="meta"><div class="name">Red tint 2</div><div class="hex">#f9d1d6</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--gold-tint)"></div><div class="meta"><div class="name">Gold tint</div><div class="hex">#fff7cc</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--gold-tint-2)"></div><div class="meta"><div class="name">Gold tint 2</div><div class="hex">#fbe7a8</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-muted)"></div><div class="meta"><div class="name">Surface muted</div><div class="hex">#f4f4f4</div></div></div>
</div>
</body></html>
