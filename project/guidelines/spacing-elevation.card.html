<!-- @dsCard group="Spacing" viewport="700x150" name="Elevation" subtitle="Sparing shadows — the brand leans on blocks & rules" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:30px;background:var(--surface);display:flex;align-items:center;gap:34px}
  .item{display:flex;flex-direction:column;align-items:center;gap:12px}
  .card{width:120px;height:64px;background:#fff;border:1px solid var(--border);border-radius:var(--radius-md)}
  .lab{font-family:var(--font-heading);font-size:11px;color:var(--text-subtle)}
</style></head><body>
  <div class="item"><div class="card" style="box-shadow:var(--shadow-sm)"></div><span class="lab">shadow-sm</span></div>
  <div class="item"><div class="card" style="box-shadow:var(--shadow-md)"></div><span class="lab">shadow-md · card hover</span></div>
  <div class="item"><div class="card" style="box-shadow:var(--shadow-lg)"></div><span class="lab">shadow-lg · overlays</span></div>
</body></html>
