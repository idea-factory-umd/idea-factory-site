<!-- @dsCard group="Colors" viewport="700x150" name="Core palette" subtitle="Maryland Red, Gold, Black, White — the brand core" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface)}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .sw{border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden}
  .chip{height:74px}
  .meta{padding:10px 12px;font-family:var(--font-heading)}
  .name{font-weight:700;font-size:13px;letter-spacing:.02em;text-transform:uppercase;color:var(--text-strong)}
  .hex{font-size:12px;color:var(--text-subtle);font-family:var(--font-body)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--md-red)"></div><div class="meta"><div class="name">Maryland Red</div><div class="hex">#e21833</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--md-gold)"></div><div class="meta"><div class="name">Maryland Gold</div><div class="hex">#ffd200</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--md-black)"></div><div class="meta"><div class="name">Black</div><div class="hex">#000000</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--md-white);border-bottom:1px solid var(--border)"></div><div class="meta"><div class="name">White</div><div class="hex">#ffffff</div></div></div>
</div>
</body></html>
