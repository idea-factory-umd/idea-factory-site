<!-- @dsCard group="Brand" viewport="700x320" name="Stage glyphs" subtitle="Transparent set (light) and white-tiled set (dark)" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:0;background:var(--surface)}
  .band{display:flex;align-items:center;justify-content:space-around;padding:26px 20px;gap:14px}
  .light{background:#fff}
  .dark{background:var(--md-black)}
  .g{display:flex;flex-direction:column;align-items:center;gap:12px}
  .g img{width:88px;height:88px;display:block}
  .num{font-family:var(--font-heading);font-weight:800;font-size:12px;letter-spacing:.06em;text-transform:uppercase}
  .light .num{color:var(--md-black)}
  .dark .num{color:#fff}
  .num b{color:var(--md-red)}
</style></head><body>
<div class="band light">
  <div class="g"><img src="../assets/glyphs/stage-01-blueprint.svg"><span class="num"><b>01</b> Blueprint</span></div>
  <div class="g"><img src="../assets/glyphs/stage-02-proving-ground.svg"><span class="num"><b>02</b> Proving Ground</span></div>
  <div class="g"><img src="../assets/glyphs/stage-03-assembly-line.svg"><span class="num"><b>03</b> Assembly Line</span></div>
  <div class="g"><img src="../assets/glyphs/stage-04-scale-up.svg"><span class="num"><b>04</b> Scale-Up</span></div>
</div>
<div class="band dark">
  <div class="g"><img src="../assets/glyphs/stage-01-blueprint-tile.svg"></div>
  <div class="g"><img src="../assets/glyphs/stage-02-proving-ground-tile.svg"></div>
  <div class="g"><img src="../assets/glyphs/stage-03-assembly-line-tile.svg"></div>
  <div class="g"><img src="../assets/glyphs/stage-04-scale-up-tile.svg"></div>
</div>
</body></html>
