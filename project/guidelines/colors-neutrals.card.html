<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="UMD grays + Bronze Testudo for supporting UI" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface)}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
  .sw{border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden}
  .chip{height:64px}
  .meta{padding:9px 11px;font-family:var(--font-heading)}
  .name{font-weight:700;font-size:11px;letter-spacing:.02em;text-transform:uppercase;color:var(--text-strong)}
  .hex{font-size:11px;color:var(--text-subtle);font-family:var(--font-body)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--gray-700)"></div><div class="meta"><div class="name">Dark Gray</div><div class="hex">#454545</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-500)"></div><div class="meta"><div class="name">Medium Gray</div><div class="hex">#7f7f7f</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-200)"></div><div class="meta"><div class="name">Light Gray</div><div class="hex">#e6e6e6</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-100)"></div><div class="meta"><div class="name">Off-white</div><div class="hex">#f4f4f4</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--bronze)"></div><div class="meta"><div class="name">Bronze Testudo</div><div class="hex">#ad7231</div></div></div>
</div>
</body></html>
