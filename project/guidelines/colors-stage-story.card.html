<!-- @dsCard group="Colors" viewport="700x170" name="Stage color story" subtitle="Red → Black → Gold: in the red, in the black, struck gold" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface);font-family:var(--font-body)}
  .flow{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;align-items:center;gap:14px}
  .stage{border-radius:var(--radius-md);padding:18px;color:#fff;min-height:90px;display:flex;flex-direction:column;justify-content:space-between}
  .lab{font-family:var(--font-heading);font-weight:800;font-size:13px;letter-spacing:.06em;text-transform:uppercase}
  .desc{font-size:13px;opacity:.92}
  .arrow{font-family:var(--font-heading);font-weight:800;font-size:22px;color:var(--text-subtle)}
</style></head><body>
<div class="flow">
  <div class="stage" style="background:var(--md-red)"><span class="lab">Red</span><span class="desc">Unproven — "in the red"</span></div>
  <span class="arrow">→</span>
  <div class="stage" style="background:var(--md-black)"><span class="lab">Black</span><span class="desc">Solid — "in the black"</span></div>
  <span class="arrow">→</span>
  <div class="stage" style="background:var(--md-gold);color:var(--md-black)"><span class="lab">Gold</span><span class="desc">Success — "struck gold"</span></div>
</div>
</body></html>
