<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base — space-1 … space-9" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface);display:flex;align-items:flex-end;gap:18px}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--md-red);width:100%}
  .box{display:flex;align-items:flex-end;height:80px}
  .lab{font-family:var(--font-heading);font-size:11px;color:var(--text-subtle)}
</style></head><body>
  <div class="item"><div class="box"><div class="bar" style="width:4px;height:4px"></div></div><span class="lab">1·4</span></div>
  <div class="item"><div class="box"><div class="bar" style="width:8px;height:8px"></div></div><span class="lab">2·8</span></div>
  <div class="item"><div class="box"><div class="bar" style="width:16px;height:16px"></div></div><span class="lab">4·16</span></div>
  <div class="item"><div class="box"><div class="bar" style="width:24px;height:24px"></div></div><span class="lab">5·24</span></div>
  <div class="item"><div class="box"><div class="bar" style="width:32px;height:32px"></div></div><span class="lab">6·32</span></div>
  <div class="item"><div class="box"><div class="bar" style="width:48px;height:48px"></div></div><span class="lab">7·48</span></div>
  <div class="item"><div class="box"><div class="bar" style="width:64px;height:64px"></div></div><span class="lab">8·64</span></div>
  <div class="item"><div class="box"><div class="bar" style="width:96px;height:80px"></div></div><span class="lab">9·96</span></div>
</body></html>
