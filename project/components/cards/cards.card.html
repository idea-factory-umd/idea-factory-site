<!-- @dsCard group="Components" viewport="700x520" name="Cards: Audience & Program" subtitle="Audience entry boxes and program directory boxes" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--surface); }
  .lbl { font-family: var(--font-heading); font-size: 11px; letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-subtle); margin: 0 0 12px; }
  .aud { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; margin-bottom: 28px; }
  .prog { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { AudienceCard, ProgramCard } = window.IdeaFactoryDesignSystem_745a71;
  function Demo() {
    return (
      <div>
        <p className="lbl">Audience entry boxes</p>
        <div className="aud">
          <AudienceCard title="Students" description="Become an entrepreneur." tone="red" />
          <AudienceCard title="Faculty / Researchers" description="Take research to market." tone="black" />
          <AudienceCard title="Companies" description="Tap university firepower." tone="gold" />
          <AudienceCard title="Partners" description="Mentor, fund, collaborate." tone="white" />
        </div>
        <p className="lbl">Program directory boxes</p>
        <div className="prog">
          <ProgramCard label="Hinman CEOs" fullName="Hinman CEOs Program" line="Living-learning community for student entrepreneurs" tags={["Undergraduate","Community & space"]} />
          <ProgramCard label="ASPIRE" line="Funding for undergraduates doing research with Clark School faculty" tags={["Undergraduate","Funding"]} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
