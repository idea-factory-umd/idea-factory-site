<!-- @dsCard group="Components" viewport="700x320" name="Buttons & Tags" subtitle="Actions, filter chips, and labels" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--surface); }
  .stack { display: flex; flex-direction: column; gap: 22px; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; }
  .lbl { font-family: var(--font-heading); font-size: 11px; letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-subtle); width: 100%; margin-bottom: -6px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, Tag } = window.IdeaFactoryDesignSystem_745a71;
  function Demo() {
    const [filter, setFilter] = React.useState("Graduate");
    return (
      <div className="stack">
        <div className="row">
          <span className="lbl">Buttons</span>
          <Button variant="primary" size="lg" iconAfter={<span>››</span>}>Apply now</Button>
          <Button variant="dark">Partner with us</Button>
          <Button variant="outline">See programs</Button>
          <Button variant="ghost" as="a" href="#">More ››</Button>
          <Button variant="primary" disabled>Disabled</Button>
        </div>
        <div className="row">
          <span className="lbl">Filter chips</span>
          {["Undergraduate","Graduate","Online","Funding","All"].map(f => (
            <Tag key={f} interactive pressed={filter===f} onClick={()=>setFilter(f)}>{f}</Tag>
          ))}
        </div>
        <div className="row">
          <span className="lbl">Tags</span>
          <Tag>Undergraduate</Tag>
          <Tag tone="red">Funding</Tag>
          <Tag tone="gold">New</Tag>
          <Tag tone="dark">Graduate</Tag>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
